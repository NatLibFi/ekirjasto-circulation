[tox]
envlist = py312-{api,core}-docker
skipsdist = true

[testenv]
commands_pre =
    poetry install --without ci -v
commands =
    api: python scripts/tox_pytest.py api {posargs:tests/api}
    core: python scripts/tox_pytest.py core {posargs:tests/core}
passenv =
    SIMPLIFIED_*
    PALACE_*
    CI
setenv =
    {api,core}: COVERAGE_FILE = .coverage.{envname}
    docker: DOCKER_HOST=unix:///var/run/docker.sock
    core-docker: PALACE_TEST_MINIO_USER=palace
    core-docker: PALACE_TEST_MINIO_PASSWORD=12345678901234567890
docker =
    docker: os-circ
    docker: db-circ
    core-docker: minio-circ
allowlist_externals =
    docker: docker
    poetry
    python

[testenv:migration-docker]
commands =
    python scripts/tox_pytest.py migration {posargs:tests/migration}
docker =
    docker: db-circ

[testenv:report]
skip_install = true
commands =
    coverage combine
    coverage html
allowlist_externals =
    poetry
    coverage

[docker:db-circ]
image = postgres:12
environment =
    POSTGRES_USER=simplified_test
    POSTGRES_PASSWORD=test
    POSTGRES_DB=simplified_circulation_test
expose =
    DB_CIRC_5432_TCP_PORT=5432/tcp
host_var =
    DB_CIRC_HOST
healthcheck_cmd = pg_isready
healthcheck_interval = 5
healthcheck_retries = 10

[docker:os-circ]
dockerfile = {toxinidir}/docker/Dockerfile.ci
dockerfile_target = opensearch
environment =
    discovery.type=single-node
    DISABLE_SECURITY_PLUGIN=true
expose =
    OS_CIRC_9200_TCP_PORT=9200/tcp
host_var =
    OS_CIRC_HOST

[docker:minio-circ]
image = bitnamilegacy/minio:latest
environment =
    MINIO_ROOT_USER=palace
    MINIO_ROOT_PASSWORD=12345678901234567890
expose =
    MINIO_CIRC_9000_TCP_PORT=9000/tcp
host_var =
    MINIO_CIRC_HOST

[gh-actions]
python =
    3.12: py312

[gh-actions:env]
MODULE =
    Core: core
    Api: api
