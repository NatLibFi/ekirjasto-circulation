name: Test & Build
on: [push, pull_request]

concurrency:
  group: test-build-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.module }} Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        module: [Api, Core]

    # We want to run on external PRs, but not on our own internal PRs as they'll be run
    # by the push to the branch. This prevents duplicated runs on internal PRs.
    # Some discussion of this here:
    # https://github.community/t/duplicate-checks-on-push-and-pull-request-simultaneous-event/18012
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v7

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Apt Packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes libxmlsec1-dev libxml2-dev

      - name: Install Poetry
        uses: ./.github/actions/poetry

      - name: Install Tox
        run: |
          poetry install --only ci
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Run Tests
        run: tox
        env:
          # Fixes KeyError: 'Gateway'
          TOX_DOCKER_GATEWAY: "0.0.0.0"
          MODULE: ${{ matrix.module }}

  test-migrations:
    name: Migration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # We want to run on external PRs, but not on our own internal PRs as they'll be run
    # by the push to the branch. This prevents duplicated runs on internal PRs.
    # Some discussion of this here:
    # https://github.community/t/duplicate-checks-on-push-and-pull-request-simultaneous-event/18012
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v7

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Apt Packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes libxmlsec1-dev libxml2-dev

      - name: Install Poetry
        uses: ./.github/actions/poetry

      - name: Install Tox
        run: |
          poetry install --only ci
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Run Migration Tests
        run: tox -e "migration-docker"
        env:
          TOX_DOCKER_GATEWAY: "0.0.0.0"

  prepare-base-image:
    name: Prepare base image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      baseimage: ${{ steps.baseimage.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # We use docker/metadata-action to generate tags, instead of using string
      # interpolation, because it properly handles making sure special
      # characters are escaped, and the repo owner string is lowercase.
      - name: Generate tags for base image
        id: baseimage-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ekirjasto-circ-baseimage
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      # We are using docker/metadata-action here for the same reason as above.
      - name: Generate tag for latest
        id: baseimage-latest
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ekirjasto-circ-baseimage
          tags: |
            type=raw,value=latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # If the base image build was changed, we build it first so the rest of the
      # pipeline uses the updated image. Otherwise we rely on the scheduled build.
      - name: Check if base image was changed by this branch
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            baseimage:
              - 'docker/Dockerfile.baseimage'

      # Check whether the branch-specific tag already exists in GHCR.
      # It was built on a previous push to this branch and does not need rebuilding
      # unless Dockerfile.baseimage changed in the current commit.
      - name: Check if branch base image tag exists
        id: tag-check
        run: |
          branch_tag="${{ fromJSON(steps.baseimage-meta.outputs.json).tags[0] }}"
          if docker buildx imagetools inspect "$branch_tag" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Build only when: the branch tag is missing, or Dockerfile.baseimage changed.
      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.baseimage
          target: baseimage
          cache-from: |
            type=registry,ref=${{ fromJSON(steps.baseimage-meta.outputs.json).tags[0] }}
            type=registry,ref=${{ fromJSON(steps.baseimage-latest.outputs.json).tags[0] }}
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.baseimage-meta.outputs.tags }}
          labels: ${{ steps.baseimage-meta.outputs.labels }}
          push: true
        if: steps.tag-check.outputs.exists == 'false' || steps.changes.outputs.baseimage == 'true'

      - name: Set base image tag
        id: baseimage
        run: |
          tag="${{ fromJSON(steps.baseimage-meta.outputs.json).tags[0] }}"
          echo "Base image tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  docker-test-migrations:
    name: Docker migration test
    runs-on: ubuntu-latest
    needs: [prepare-base-image]
    permissions:
      contents: read

    # We want to run on external PRs, but not on our own internal PRs as they'll be run
    # by the push to the branch. This prevents duplicated runs on internal PRs.
    # Some discussion of this here:
    # https://github.community/t/duplicate-checks-on-push-and-pull-request-simultaneous-event/18012
    # Use always() so this job still runs when prepare-base-image is skipped (PR events).
    # On PR events BUILD_BASE_IMAGE will be empty, falling back to :latest in docker-compose.yml.
    if: >-
      always() &&
      needs.prepare-base-image.result != 'failure' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository)

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Test migrations
        run: ./docker/ci/test_migrations.sh
        env:
          BUILD_BASE_IMAGE: ${{ needs.prepare-base-image.outputs.baseimage }}

  docker-build-and-test:
    name: Docker build & test (${{ matrix.arch }})
    # Use native runners per platform — no QEMU, much faster than emulated builds.
    runs-on: ${{ matrix.runner }}
    needs: [prepare-base-image]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose build webapp scripts os
        env:
          BUILD_BASE_IMAGE: ${{ needs.prepare-base-image.outputs.baseimage }}
          # Disable the compose-file default cache source (main branch Jammy image)
          # so stale Python 3.10 layers are never used when base image changed.
          BUILD_CACHE_FROM: ""

      - name: Start container stack
        run: docker compose up --no-build -d
        env:
          BUILD_BASE_IMAGE: ${{ needs.prepare-base-image.outputs.baseimage }}

      - name: Run webapp tests
        run: ./docker/ci/test_webapp.sh webapp

      - name: Run scripts tests
        run: ./docker/ci/test_scripts.sh scripts

      - name: Output logs on failure
        if: failure()
        run: |
          docker logs circulation-webapp-1 || true
          docker logs circulation-scripts-1 || true

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-image-push:
    name: Push ekirjasto-circ-${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [test, test-migrations, docker-test-migrations, docker-build-and-test, prepare-base-image]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ["scripts", "webapp", "exec"]

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      # QEMU is still needed here for the final multi-platform manifest push.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: ./.github/actions/poetry

      - name: Setup Dunamai
        run: poetry install --only ci
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Create version file
        run: |
          echo "__version__ = '$(dunamai from git --style semver)'" >> core/_version.py
          echo "__commit__ = '$(dunamai from git --format {commit} --full-commit)'" >> core/_version.py
          echo "__branch__ = '$(dunamai from git --format {branch})'" >> core/_version.py

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags for image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ekirjasto-circ-${{ matrix.image }}
          tags: |
            type=semver,pattern={{major}}.{{minor}},priority=10
            type=semver,pattern={{version}},priority=20
            type=ref,event=branch,priority=30
            type=sha,priority=40

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image }}
          # Pull inline cache from the base image and from previous branch pushes.
          cache-from: |
            type=registry,ref=${{ needs.prepare-base-image.outputs.baseimage }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ needs.prepare-base-image.outputs.baseimage }}
